<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walkie-Talkie</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
<div id="personLeft" class="person">
    <div class="line-status talk">
        <div class="line-status-busy">Busy</div>
        <div class="line-status-talk">Talk</div>
        <div class="line-status-open">Open</div>
    </div>
    <div class="messages">
        <p>Testing, testing.</p>
        <p>This is right, who is that?</p>
    </div>
    <div class="input-container">
        <input type="text" value="Hello right. This is left.">
    </div>
</div>
<div id="personRight" class="person">
    <div class="line-status busy">
        <div class="line-status-busy">Busy</div>
        <div class="line-status-talk">Talk</div>
        <div class="line-status-open">Open</div>
    </div>
    <div class="messages">
        <p>Testing who? Is anyone there? Does this thing work?</p>
    </div>
    <div class="input-container">
        <input type="text">
    </div>
</div>
<div id="communicationConcept" class="right">
    <div class="neutral">&LeftRightArrow;</div>
    <div class="right">&rightarrow;</div>
    <div class="left">&leftarrow;</div>
</div>
</body>
</html>
